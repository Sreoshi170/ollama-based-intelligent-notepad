<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Notepad with Autocorrect and Suggestions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .notepad-container {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 800px;
      overflow: hidden;
    }

    .toolbar {
      background-color: #007bff;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar button {
      background-color: #ffffff;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s;
    }

    .toolbar button:hover {
      background-color: #e0e0e0;
    }

    .toolbar button.active {
      background-color: #d0e6ff;
    }

    #noteArea {
      width: 100%;
      min-height: 400px;
      padding: 20px;
      border: none;
      outline: none;
      font-size: 16px;
      resize: none;
      line-height: 1.5;
    }

    #status {
      padding: 10px;
      background-color: #f8f9fa;
      text-align: right;
      font-size: 14px;
      color: #555;
    }

    @media (max-width: 600px) {
      .notepad-container {
        margin: 10px;
      }

      .toolbar {
        padding: 8px;
        gap: 5px;
      }

      .toolbar button {
        padding: 6px 10px;
        font-size: 12px;
      }

      #noteArea {
        min-height: 300px;
        font-size: 14px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="notepad-container">
    <div class="toolbar">
      <button onclick="formatText('bold')">Bold</button>
      <button onclick="formatText('italic')">Italic</button>
      <button onclick="formatText('underline')">Underline</button>
      <button onclick="toggleAutocorrect()" id="autocorrectBtn">Autocorrect: Off</button>
      <button onclick="toggleSuggestions()" id="suggestionsBtn">Suggestions: Off</button>
      <button onclick="saveNote()">Save</button>
    </div>
    <div contenteditable="true" id="noteArea" placeholder="Start typing your notes..."></div>
    <div id="status">Last saved: Never</div>
  </div>

  <script>
    const noteArea = document.getElementById('noteArea');
    const status = document.getElementById('status');
    const autocorrectBtn = document.getElementById('autocorrectBtn');
    const suggestionsBtn = document.getElementById('suggestionsBtn');
    let isAutocorrectOn = false;
    let isSuggestionsOn = false;

    // Load saved note from localStorage on page load
    window.onload = () => {
      const savedNote = localStorage.getItem('note');
      if (savedNote) {
        noteArea.innerHTML = savedNote;
        updateStatus();
      }
    };

    // Format text using execCommand
    function formatText(command) {
      document.execCommand(command, false, null);
      updateButtonStates();
      noteArea.focus();
    }

    // Update toolbar button states (active/inactive)
    function updateButtonStates() {
      const buttons = document.querySelectorAll('.toolbar button:not([onclick="saveNote()"]):not([id="autocorrectBtn"]):not([id="suggestionsBtn"])');
      buttons.forEach(button => {
        const command = button.getAttribute('onclick').match(/'([^']+)'/)[1];
        button.classList.toggle('active', document.queryCommandState(command));
      });
    }

    // Save note to localStorage
    function saveNote() {
      localStorage.setItem('note', noteArea.innerHTML);
      updateStatus();
    }

    // Update status message
    function updateStatus() {
      const now = new Date().toLocaleString();
      status.textContent = `Last saved: ${now}`;
    }

    // Toggle autocorrect feature
    function toggleAutocorrect() {
      isAutocorrectOn = !isAutocorrectOn;
      autocorrectBtn.textContent = `Autocorrect: ${isAutocorrectOn ? 'On' : 'Off'}`;
      autocorrectBtn.classList.toggle('active', isAutocorrectOn);
      noteArea.focus();
    }

    // Toggle suggestion feature
    function toggleSuggestions() {
      isSuggestionsOn = !isSuggestionsOn;
      suggestionsBtn.textContent = `Suggestions: ${isSuggestionsOn ? 'On' : 'Off'}`;
      suggestionsBtn.classList.toggle('active', isSuggestionsOn);
      noteArea.focus();
    }

    // Get the last word from the current content
    function getLastWord() {
      const text = noteArea.textContent.trim();
      const words = text.split(/\s+/);
      return words[words.length - 1] || '';
    }

    // Replace the last word with the API response
    async function replaceLastWord(correctedWord) {
      const selection = window.getSelection();
      const range = document.createRange();
      const text = noteArea.textContent;
      const words = text.split(/\s+/);
      const lastWord = words.pop();
      if (!lastWord) return;

      const newText = words.join(' ') + (words.length ? ' ' : '') + correctedWord.trim();
      noteArea.textContent = newText;

      // Move cursor to the end
      range.selectNodeContents(noteArea);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    // Append a suggested word
    async function appendSuggestedWord(suggestedWord) {
      const selection = window.getSelection();
      const range = document.createRange();
      noteArea.textContent += suggestedWord.trim();
      // Move cursor to the end
      range.selectNodeContents(noteArea);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    // Call the autocorrect API
    async function callAutocorrectAPI(word) {
      try {
        const response = await fetch('http://localhost:11434/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'gemma2:2b',
            messages: [
              {
                role: 'user',
                content: `Act as autocorrect expert just correct user input if needed, dont add anything else or response any other text or sentence along with the response. Give response in one word dont. Input: ${word}. Give one word response only`
              }
            ],
            stream: false,
            temperature: 0
          })
        });
        const data = await response.json();
        return data.message.content.trim();
      } catch (error) {
        console.error('Autocorrect API call failed:', error);
        return word; // Return original word if API fails
      }
    }

    // Call the suggestion API
    async function callSuggestionAPI(text) {
      try {
        const response = await fetch('http://localhost:11434/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: 'gemma2:2b',
            messages: [
              {
                role: 'user',
                content: `Act as auto suggestion expert just suggest next word based on user input based on the input sentence, dont add anything else or response any other text or sentence along with the response. Give response in one word only. Input: ${text}`
              }
            ],
            stream: false,
            temperature: 0
          })
        });
        const data = await response.json();
        return data.message.content.trim();
      } catch (error) {
        console.error('Suggestion API call failed:', error);
        return ''; // Return empty string if API fails
      }
    }

    // Handle spacebar press for autocorrect, suggestions, and space insertion
    noteArea.addEventListener('keydown', async (event) => {
      if (event.key === ' ') {
        event.preventDefault();
        let text = noteArea.textContent.trim();
        const lastWord = getLastWord();

        // Handle autocorrect
        if (isAutocorrectOn && lastWord) {
          const correctedWord = await callAutocorrectAPI(lastWord);
          await replaceLastWord(correctedWord);
          text = noteArea.textContent.trim(); // Update text after correction
        }

        // Always add a space
        noteArea.textContent += ' ';
        text = noteArea.textContent.trim();

        // Handle suggestions
        if (isSuggestionsOn) {
          const suggestedWord = await callSuggestionAPI(text);
          if (suggestedWord) {
            await appendSuggestedWord(suggestedWord + ' ');
          }
        }

        // Move cursor to the end
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(noteArea);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }
    });

    // Update button states on selection change
    noteArea.addEventListener('select', updateButtonStates);
    noteArea.addEventListener('click', updateButtonStates);
    noteArea.addEventListener('keyup', (event) => {
      if (event.key !== ' ') updateButtonStates();
    });
  </script>
</body>
</html>
